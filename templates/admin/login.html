<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Rana Saad Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-wrap {
      width: 100%;
      max-width: 380px;
      padding: 24px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo-name {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }
    .login-logo-sub {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      margin-top: 4px;
    }
    .login-card {
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 28px;
    }
    .login-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .login-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 24px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }
    label {
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.5);
    }
    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: #fff;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input[type="password"]:focus {
      border-color: #d4500a;
      box-shadow: 0 0 0 3px rgba(212,80,10,0.15);
    }
    .btn-login {
      width: 100%;
      padding: 11px;
      background: #d4500a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
    }
    .btn-login:hover { background: #b8440a; }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      text-decoration: none;
      transition: color 0.15s;
    }
    .back-link:hover { color: rgba(255,255,255,0.6); }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <div class="login-logo-name">Rana Saad</div>
      <div class="login-logo-sub">Portfolio Admin</div>
    </div>
    <div class="login-card">
      <div class="login-title">Sign in</div>
      <div class="login-sub">Enter your password to access the admin panel.</div>
      <form action="/admin/login" method="post">
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" autofocus>
        </div>
        <button type="submit" class="btn-login">Sign in →</button>
      </form>
    </div>
    <a href="/" class="back-link">← Back to portfolio</a>
  </div>
</body>
</html>
