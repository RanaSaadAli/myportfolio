<!DOCTYPE html>
<html>
<head>
    <title>Manage Blog</title>
</head>
<body>

    <h1>Manage Blog Posts</h1>
    <a href="/dashboard">Back to Dashboard</a>

    <!-- Add New Post Form -->
    <h2>Add New Post</h2>
    <form action="/admin/manage-blog" method="post">
        <input type="text" name="title" placeholder="Title"><br>
        <input type="text" name="summary" placeholder="Summary"><br>
        <textarea name="content" placeholder="Write your content in markdown"></textarea><br>
        <input type="text" name="date" placeholder="Date"><br>
        <input type="text" name="about" placeholder="Tag"><br>
        <button type="submit">Save Post</button>
    </form>

    <hr>

    <!-- Existing Posts -->
    <h2>Existing Posts</h2>
    {% for post in blog_data %}
    <div>
        <h3>{{ post['title'] }}</h3>
        <p>{{ post['summary'] }}</p>
        <p>{{ post['date'] }} | {{ post['about'] }}</p>
        <a href="/admin/blog/edit/{{ post['id'] }}">Edit</a>
        <a href="/admin/blog/delete/{{ post['id'] }}">Delete</a>
    </div>
    <hr>
    {% endfor %}

</body>
</html>
