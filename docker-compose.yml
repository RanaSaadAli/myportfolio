services:
  web:
    image: saadali96/portfolio:latest
    ports:
      - "8000:8000"
    env_file:
      - .env

  prometheus:
    image: prom/prometheus
    ports: 
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"