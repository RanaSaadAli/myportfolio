name: myPortfolio pipline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on:  ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v3
        -name: login to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB-USERNAME}}
          password: ${{ secrets.DOCKERHUB-PASSWORD}}